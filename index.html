<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast IPTV Channel Viewer</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#111; color:#eee; }
header { background:#1f1f1f; padding:12px; display:flex; gap:8px; flex-wrap:wrap; position:sticky; top:0; z-index:10; }
input, button, select { padding:9px; border-radius:6px; border:none; }
button { background:#2563eb; color:white; cursor:pointer; }
select { background:white; color:#111; }
#status { padding:10px; background:#000; color:#bbb; font-size:14px; }
#layout { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - 120px); }
#categories { overflow-y:auto; background:#181818; border-right:1px solid #333; padding:10px; }
#channels { overflow-y:auto; padding:10px; }
.category { padding:10px; background:#262626; margin-bottom:6px; border-radius:6px; cursor:pointer; }
.category:hover { background:#333; }
.category.active { background:#2563eb; }
.channel { padding:9px; background:#1d1d1d; border-bottom:1px solid #333; font-size:14px; }
.channel-row { display:flex; justify-content:space-between; gap:10px; align-items:center; }
.channel-actions { display:flex; gap:6px; flex-wrap:wrap; }
.small { font-size:12px; color:#aaa; word-break:break-all; }
.section-title { width:100%; color:#aaa; font-size:13px; margin-top:8px; }
</style>
</head>

<body>

<header>
  <div class="section-title">Xtream Login</div>
  <input id="server" placeholder="Server URL e.g. http://example.com:8080" size="35">
  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password" type="password">
  <button onclick="loadXtream()">Load Xtream</button>

  <div class="section-title">M3U Playlist URL</div>
  <input id="m3uUrl" placeholder="Paste M3U/M3U8 playlist URL" size="70">
  <button onclick="loadM3U()">Load M3U</button>

  <div class="section-title">Search / External Player</div>
  <input id="search" placeholder="Search channels..." oninput="searchChannels()" size="45">
  <button onclick="clearSearch()">Clear</button>

</header>

<div id="status">Enter Xtream details or paste an M3U playlist URL.</div>

<div id="layout">
  <div id="categories"></div>
  <div id="channels">Select a category or search for a channel.</div>
</div>

<script>
let groupedData = [];
let activeCategory = null;
let sourceType = "";

function cleanServer(url) {
  return url.trim().replace(/\/$/, "");
}

function getXtreamDetails() {
  return {
    server: cleanServer(document.getElementById("server").value),
    username: document.getElementById("username").value.trim(),
    password: document.getElementById("password").value.trim()
  };
}

async function xtream(action, extra = "") {
  const d = getXtreamDetails();

  const url =
    `${d.server}/player_api.php?username=${encodeURIComponent(d.username)}` +
    `&password=${encodeURIComponent(d.password)}&action=${action}${extra}`;

  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed to load Xtream data");

  return await res.json();
}

async function loadXtream() {
  groupedData = [];
  activeCategory = null;
  sourceType = "xtream";

  document.getElementById("categories").innerHTML = "";
  document.getElementById("channels").innerHTML = "";
  document.getElementById("status").textContent = "Loading Xtream categories...";

  try {
    const categories = await xtream("get_live_categories");

    document.getElementById("status").textContent = "Loading all Xtream channels...";

    const streams = await xtream("get_live_streams");

    const categoryMap = {};
    categories.forEach(cat => {
      categoryMap[cat.category_id] = cat.category_name || "Uncategorised";
    });

    const groups = {};

    streams.forEach(ch => {
      const groupName = categoryMap[ch.category_id] || "Uncategorised";

      if (!groups[groupName]) groups[groupName] = [];

      groups[groupName].push({
  name: ch.name || "Unnamed Channel",
  streamId: ch.stream_id || "",
  extension: ch.container_extension || "ts",
  logo: ch.stream_icon || "",
  url: ""
});
    });

    groupedData = Object.keys(groups).sort().map(name => ({
      name,
      channels: groups[name].sort((a, b) => a.name.localeCompare(b.name))
    }));

    renderCategories();

    document.getElementById("channels").innerHTML =
      "Loaded. Select a category on the left or search for a channel.";

    document.getElementById("status").textContent =
      `Loaded ${countChannels(groupedData)} channels in ${groupedData.length} categories.`;

  } catch (err) {
    console.error(err);
    document.getElementById("status").textContent =
      "Error loading Xtream. Check details or CORS.";
  }
}

async function loadM3U() {
  groupedData = [];
  activeCategory = null;
  sourceType = "m3u";

  const m3uUrl = document.getElementById("m3uUrl").value.trim();

  if (!m3uUrl) {
    document.getElementById("status").textContent = "Paste an M3U playlist URL first.";
    return;
  }

  document.getElementById("categories").innerHTML = "";
  document.getElementById("channels").innerHTML = "";
  document.getElementById("status").textContent = "Loading M3U playlist...";

  try {
    const res = await fetch(m3uUrl);
    if (!res.ok) throw new Error("Failed to fetch M3U");

    const text = await res.text();
    groupedData = parseM3U(text);

    renderCategories();

    document.getElementById("channels").innerHTML =
      "Loaded. Select a category on the left or search for a channel.";

    document.getElementById("status").textContent =
      `Loaded ${countChannels(groupedData)} channels in ${groupedData.length} categories.`;

  } catch (err) {
    console.error(err);
    document.getElementById("status").textContent =
      "Error loading M3U. The playlist may be blocked by CORS.";
  }
}

function parseM3U(text) {
  const lines = text.split(/\r?\n/);
  const groups = {};
  let currentInfo = null;

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;

    if (line.startsWith("#EXTINF")) {
      currentInfo = {
        name: getChannelName(line),
        group: getAttr(line, "group-title") || "Uncategorised",
        logo: getAttr(line, "tvg-logo") || "",
        url: ""
      };
    } else if (currentInfo && !line.startsWith("#")) {
      currentInfo.url = line;

      if (!groups[currentInfo.group]) groups[currentInfo.group] = [];

      groups[currentInfo.group].push(currentInfo);
      currentInfo = null;
    }
  }

  return Object.keys(groups).sort().map(groupName => ({
    name: groupName,
    channels: groups[groupName].sort((a, b) => a.name.localeCompare(b.name))
  }));
}

function renderCategories() {
  const categoriesDiv = document.getElementById("categories");
  categoriesDiv.innerHTML = "";

  groupedData.forEach((group, index) => {
    const div = document.createElement("div");
    div.className = "category";
    div.textContent = `${group.name} (${group.channels.length})`;

    div.onclick = () => {
      activeCategory = index;
      document.getElementById("search").value = "";
      renderCategories();
      renderChannels(group.channels, group.name);
    };

    if (activeCategory === index) div.classList.add("active");

    categoriesDiv.appendChild(div);
  });
}

function getStreamUrl(ch) {
  if (ch.url) return ch.url;

  const d = getXtreamDetails();

  if (ch.streamId) {
    const ext = ch.extension || "ts";

    return `${d.server}/live/${encodeURIComponent(d.username)}/${encodeURIComponent(d.password)}/${ch.streamId}.${ext}`;
  }

  return "";
}

function renderChannels(channels, title = "Channels") {
  const channelsDiv = document.getElementById("channels");
  channelsDiv.innerHTML = "";

  const heading = document.createElement("h2");
  heading.textContent = `${title} (${channels.length})`;
  channelsDiv.appendChild(heading);

  const fragment = document.createDocumentFragment();

  channels.forEach(ch => {
    const streamUrl = getStreamUrl(ch);

    const row = document.createElement("div");
    row.className = "channel";

    row.innerHTML = `
      <div class="channel-row">
        <div style="flex:1;">
          <strong>${escapeHtml(ch.name)}</strong>
          <div class="small">
            ${ch.streamId ? "Stream ID: " + escapeHtml(ch.streamId) : ""}
            ${ch.url ? escapeHtml(ch.url) : ""}
          </div>
        </div>

<div class="channel-actions">
  <button onclick="copyStream('${encodeURIComponent(streamUrl)}')">
    Copy URL
  </button>

  <button onclick="downloadM3U('${encodeURIComponent(streamUrl)}','${encodeURIComponent(ch.name)}')">
    Download .M3U
  </button>
</div>
      </div>
    `;

    fragment.appendChild(row);
  });

  channelsDiv.appendChild(fragment);
}

function searchChannels() {
  const q = document.getElementById("search").value.toLowerCase().trim();

  if (!q) {
    if (activeCategory !== null) {
      renderChannels(groupedData[activeCategory].channels, groupedData[activeCategory].name);
    } else {
      document.getElementById("channels").innerHTML =
        "Select a category or search for a channel.";
    }
    return;
  }

  activeCategory = null;
  renderCategories();

  const matches = [];

  groupedData.forEach(group => {
    group.channels.forEach(ch => {
      if (ch.name.toLowerCase().includes(q)) {
        matches.push({
          ...ch,
          groupName: group.name
        });
      }
    });
  });

  renderSearchResults(matches, q);
}

function renderSearchResults(matches, q) {
  const channelsDiv = document.getElementById("channels");
  channelsDiv.innerHTML = "";

  const heading = document.createElement("h2");
  heading.textContent = `Search: "${q}" (${matches.length})`;
  channelsDiv.appendChild(heading);

  const fragment = document.createDocumentFragment();

  matches.forEach(ch => {
    const streamUrl = getStreamUrl(ch);

    const row = document.createElement("div");
    row.className = "channel";

    row.innerHTML = `
      <div class="channel-row">
        <div style="flex:1;">
          <strong>${escapeHtml(ch.name)}</strong>
          <div class="small">
            Category: ${escapeHtml(ch.groupName)}
            <br>
            ${ch.streamId ? "Stream ID: " + escapeHtml(ch.streamId) : ""}
            ${ch.url ? escapeHtml(ch.url) : ""}
          </div>
        </div>

<div class="channel-actions">
  <button onclick="copyStream('${encodeURIComponent(streamUrl)}')">
    Copy URL
  </button>

  <button onclick="downloadM3U('${encodeURIComponent(streamUrl)}','${encodeURIComponent(ch.name)}')">
    Download .M3U
  </button>
</div>
      </div>
    `;

    fragment.appendChild(row);
  });

  channelsDiv.appendChild(fragment);
}

async function copyStream(url) {
  url = decodeURIComponent(url);

  if (!url) {
    alert("No stream URL found.");
    return;
  }

  try {
    await navigator.clipboard.writeText(url);
    document.getElementById("status").textContent = "Stream URL copied.";
  } catch {
    prompt("Copy URL:", url);
  }
}


function clearSearch() {
  document.getElementById("search").value = "";

  if (activeCategory !== null) {
    renderChannels(groupedData[activeCategory].channels, groupedData[activeCategory].name);
  } else {
    document.getElementById("channels").innerHTML =
      "Select a category or search for a channel.";
  }
}

function getAttr(line, attr) {
  const regex = new RegExp(attr + '="([^"]*)"', "i");
  const match = line.match(regex);
  return match ? match[1] : "";
}

function getChannelName(line) {
  const commaIndex = line.lastIndexOf(",");
  if (commaIndex !== -1) {
    return line.slice(commaIndex + 1).trim() || "Unnamed Channel";
  }
  return "Unnamed Channel";
}

function countChannels(groups) {
  return groups.reduce((total, group) => total + group.channels.length, 0);
}
function downloadM3U(url, name) {

  url = decodeURIComponent(url);
  name = decodeURIComponent(name);

  if (!url) {
    alert("No stream URL found.");
    return;
  }

  const safeName =
    name.replace(/[\\/:*?"<>|]/g, "_");

  const m3uContent =
`#EXTM3U
#EXTINF:-1,${name}
${url}
`;

  const blob = new Blob(
    [m3uContent],
    { type: "audio/x-mpegurl" }
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = safeName + ".m3u";

  document.body.appendChild(a);
  a.click();

  URL.revokeObjectURL(a.href);
  a.remove();
}
function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[m]));
}
</script>

</body>
</html>
